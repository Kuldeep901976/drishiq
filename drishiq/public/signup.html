<script>

  function toggleAccess() {
  const agreed = document.getElementById('agreeCheckbox').checked;
  const messageBox = document.getElementById('checkboxMessage');
  const labelArea = document.querySelector('.checkbox-container');

  if (agreed) {
    messageBox.classList.add('hidden');
    labelArea.classList.remove('pulse');
  } else {
    messageBox.classList.remove('hidden');
    labelArea.classList.add('pulse');
  }

  validateForm();
}

  function isUserIDValid(userID) {
    // Allow only letters, numbers, underscore, hyphen
    return /^[a-zA-Z0-9_-]+$/.test(userID);
  }

  function isEmailValid(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function validateForm() {
    const agreed = document.getElementById('agreeCheckbox').checked;
    const email = document.getElementById('emailField').value.trim();
    const userID = document.getElementById('userID').value.trim();
    const button = document.getElementById('magicLinkBtn');

    if (agreed && isEmailValid(email) && isUserIDValid(userID)) {
      button.classList.add('enabled');
      button.removeAttribute('disabled');
    } else {
      button.classList.remove('enabled');
      button.setAttribute('disabled', true);
    }
  }

  async function checkUserIDUnique() {
    const userID = document.getElementById('userID').value.trim();
    const messageEl = document.getElementById('userIdMessage');

    if (!userID) {
      messageEl.textContent = '';
      return;
    }

    if (!isUserIDValid(userID)) {
      messageEl.textContent = '❌ Only letters, numbers, _ and - are allowed.';
      messageEl.style.color = 'red';
      return;
    }

    const { data } = await supabase
      .from('User')
      .select('user_id')
      .eq('user_id', userID)
      .single();

    if (data) {
      messageEl.textContent = '❌ User ID already taken.';
      messageEl.style.color = 'red';
    } else {
      messageEl.textContent = '✅ User ID is available.';
      messageEl.style.color = 'green';
    }
  }

  async function handleSignup() {
    const userID = document.getElementById('userID').value.trim().toLowerCase();
    const email = document.getElementById('emailField').value.trim();

    if (!isEmailValid(email)) {
      alert('Please enter a valid email address.');
      return;
    }

    if (!isUserIDValid(userID)) {
      alert('User ID must contain only letters, numbers, underscore or hyphen.');
      return;
    }

    // Check if user ID already exists
    const { data: existing } = await supabase
      .from('User')
      .select('user_id')
      .eq('user_id', userID)
      .single();

    if (existing) {
      alert('User ID already exists. Please try another.');
      return;
    }

    // Send Magic Link
    const { error } = await supabase.auth.signInWithOtp({ email });
    if (error) {
      alert(error.message);
      return;
    }

    // Save user ID + email to DB
    await supabase.from('User').insert([{ user_id: userID, email }]);

    alert('Check your email for the login link.');
    window.location.href = 'signin.html';
  }
</script>
